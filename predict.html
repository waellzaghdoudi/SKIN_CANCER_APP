<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{cat}}">{{msg}}</div>
    {% endfor %}
    {% endwith %}

    <h2>Analyse patient</h2>

    <form method="POST" enctype="multipart/form-data">
        <input class="form-control" type="text" name="name" placeholder="Nom" required>
        <input class="form-control" type="number" name="age" placeholder="Age" required>
        <input class="form-control" type="file" name="image" required>
        <button class="btn btn-success mt-2">Analyser</button>
    </form>

</div>
</body>
</html>
